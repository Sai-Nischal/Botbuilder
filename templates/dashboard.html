<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | BotBuilder AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row min-vh-100">
            <!-- Left Panel: Form -->
            <div class="col-md-6 p-5 overflow-auto" style="max-height: 100vh;">
                <h2 class="mb-4">Business Profile</h2>
                <form id="botForm">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Business Name</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="bizName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Description</label>
                        <textarea class="form-control bg-dark text-white border-secondary" id="bizDesc" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-secondary">Type</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="bizType" placeholder="e.g. Restaurant">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-secondary">Phone</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="bizPhone">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-4" id="generateBtn">
                        Generate Chatbot Structure
                    </button>
                </form>
            </div>

            <!-- Right Panel: Preview -->
            <div class="col-md-6 p-5 bg-black d-flex align-items-center justify-content-center">
                <div class="preview-container w-75">
                    <div class="wa-header">
                        <span id="previewName">BotBuilder Preview</span>
                    </div>
                    <div class="wa-body" id="chatWindow">
                        <div class="bubble bot">Welcome! Complete the form on the left to generate my personality.</div>
                    </div>
                    <div class="wa-footer">
                        <input type="text" class="wa-input" placeholder="Type a message..." disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
