<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | BotBuilder AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-5">
    <div class="container max-width-600">
        <div class="card-glass mx-auto" style="max-width: 600px;">
            <h2 class="mb-4">API Settings</h2>
            <div class="mb-3">
                <label class="form-label">Google Gemini API Key</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" placeholder="••••••••">
            </div>
            <div class="mb-3">
                <label class="form-label">WhatsApp Access Token</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" placeholder="EAA...">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone Number ID</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="102938...">
            </div>
            <hr class="border-secondary my-4">
            <button class="btn btn-primary w-100">Save Configuration</button>
        </div>
    </div>
</body>
</html>
