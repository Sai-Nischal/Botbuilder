<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preview AI - BotBuilder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1>Generated Configuration</h1>
            <div>
                <a href="/settings" class="btn btn-outline-light me-2">Connect WhatsApp</a>
                <a href="/dashboard" class="btn btn-primary">Edit Bot</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card-glass">
                    <h4 class="mb-4">Conversation Workflow</h4>
                    <div id="flowViz" class="py-3">
                        <!-- Workflow will be drawn here -->
                        <div class="text-center p-3 border rounded mb-3">Welcome Step</div>
                        <div class="text-center py-2">↓</div>
                        <div class="text-center p-3 border rounded mb-3">Services Catalog</div>
                        <div class="text-center py-2">↓</div>
                        <div class="text-center p-3 border rounded mb-3">FAQ / AI Response</div>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card-glass">
                    <h4>JSON Output</h4>
                    <pre id="jsonViewer" class="bg-dark p-3 mt-3 rounded text-info" style="max-height: 400px; overflow: auto;"></pre>
                    <button class="btn btn-sm btn-outline-secondary mt-2" onclick="copyJSON()">Copy Code</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/generate', {method: 'POST', body: JSON.stringify({})}) // For demo display
        .then(r => r.json()).then(data => {
            document.getElementById('jsonViewer').innerText = JSON.stringify(data.data, null, 2);
        });

        function copyJSON() {
            const text = document.getElementById('jsonViewer').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
